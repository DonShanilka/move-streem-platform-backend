apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      containers:
        - name: movie-service
          image: backend-movie-service:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: movie-service
spec:
  selector:
    app: movie-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
