apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Shanilka800@#"
            - name: MYSQL_DATABASE
              value: "movies_db"
          ports:
            - containerPort: 3306
          livenessProbe:
            exec:
              command:
                [
                  "mysqladmin",
                  "ping",
                  "-h",
                  "localhost",
                  "-u",
                  "root",
                  "-pShanilka800@#",
                ]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                [
                  "mysqladmin",
                  "ping",
                  "-h",
                  "localhost",
                  "-u",
                  "root",
                  "-pShanilka800@#",
                ]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
