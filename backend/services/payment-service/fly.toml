# fly.toml app configuration file generated for payment-service

app = "move-streem-payment-service"
primary_region = "sin"

[http_service]
  internal_port = 8085
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256
